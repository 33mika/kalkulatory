<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kalkulatory</title>
  <style>
    :root {
      --bg1: #0b0f14;
      --bg2: #121821;
      --text: #e6edf3;
      --muted: #8b9bb0;
      --card: rgba(255,255,255,0.04);
      --line: rgba(255,255,255,0.08);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.6);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 30%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    body {
      padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom)) 16px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 720px;
    }

    .shell {
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 24px 22px 20px;
      background: linear-gradient(180deg, #0f1722, #1b2636);
      color: white;
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .badge .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffffff, #b8c7d6);
      box-shadow: 0 0 14px rgba(255,255,255,0.6);
    }

    h1 {
      margin: 16px 0 8px;
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      color: rgba(255,255,255,0.86);
      font-size: 1rem;
      line-height: 1.45;
      max-width: 42ch;
    }

    .content {
      padding: 22px;
      display: grid;
      gap: 14px;
    }

    .calc-link {
      display: block;
      text-decoration: none;
      color: inherit;
      border-radius: 28px;
      padding: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 12px 28px rgba(62, 80, 98, 0.12);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .calc-link:active {
      transform: scale(0.99);
    }

    .calc-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(62, 80, 98, 0.16);
    }

    .calc-card {
      border-radius: 24px;
      padding: 18px;
      color: white;
      position: relative;
      overflow: hidden;
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .calc-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 30%);
      pointer-events: none;
    }

    .calc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .calc-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.16);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .calc-tag .mini-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .arrow {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.16);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .calc-title {
      position: relative;
      z-index: 1;
      margin: 14px 0 6px;
      font-size: 1.65rem;
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .calc-desc {
      position: relative;
      z-index: 1;
      margin: 0;
      color: rgba(255,255,255,0.9);
      line-height: 1.4;
      font-size: 0.96rem;
      max-width: 36ch;
    }

    .dexdor {
      background: linear-gradient(180deg, #0d3e97 0%, #1093e0 55%, #8ee1ff 100%);
    }

    .gfr {
      background: linear-gradient(180deg, #0d5c3b 0%, #1e9f67 55%, #a8f0c8 100%);
    }

    .bmi {
      background: linear-gradient(180deg, #9a6a00 0%, #f0b400 55%, #ffe58a 100%);
      color: #fffef8;
    }

    .ligno {
      background: linear-gradient(180deg, #7c0f1d 0%, #cf2f49 55%, #ffb3bf 100%);
    }

    .footer {
      padding: 0 22px 22px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    @media (min-width: 760px) {
      .content {
        grid-template-columns: 1fr 1fr;
      }
      .calc-card {
        min-height: 160px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <header class="hero">
        <div class="hero-top">
          <div class="badge">
            <span class="dot"></span>
            MICHAA
          </div>
          
        </div>
        <h1>Kalkulatory</h1>
        
      </header>

      <section class="content">
        <a class="calc-link" href="https://33mika.github.io/ligno/">
          <div class="calc-card ligno">
            <div class="calc-head">
              <div class="calc-tag"><span class="mini-dot"></span> Ligno</div>
              <div class="arrow">→</div>
            </div>
            <div>
              <div class="calc-title">Lidokaina</div>
              <p class="calc-desc">Kalkulator wlewu lidokainy dla 1% i 2% roztworu.</p>
            </div>
          </div>
        </a>

        <a class="calc-link" href="https://33mika.github.io/GFR/">
          <div class="calc-card gfr">
            <div class="calc-head">
              <div class="calc-tag"><span class="mini-dot"></span> GFR</div>
              <div class="arrow">→</div>
            </div>
            <div>
              <div class="calc-title">GFR</div>
              <p class="calc-desc">Cockcroft-Gault z kreatyniną w mg/dl lub µmol/l.</p>
            </div>
          </div>
        </a>

        <a class="calc-link" href="https://33mika.github.io/dexdor/">
          <div class="calc-card dexdor">
            <div class="calc-head">
              <div class="calc-tag"><span class="mini-dot"></span> Dexdor</div>
              <div class="arrow">→</div>
            </div>
            <div>
              <div class="calc-title">Dexdor</div>
              <p class="calc-desc">Kalkulator przepływu dexmedetomidyny w ml/h.</p>
            </div>
          </div>
        </a>

        <a class="calc-link" href="https://33mika.github.io/bmi/">
          <div class="calc-card bmi">
            <div class="calc-head">
              <div class="calc-tag"><span class="mini-dot"></span> BMI</div>
              <div class="arrow">→</div>
            </div>
            <div>
              <div class="calc-title">BMI</div>
              <p class="calc-desc">Kalkulator BMI z szybkim wyborem masy i wzrostu.</p>
            </div>
          </div>
        </a>
      </section>

      <div class="footer">© MICHAA 2026</div>
    </section>
  </main>
</body>
</html>
